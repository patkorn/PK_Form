<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบฟอร์ม...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f4f4f9; 
        }
        
        /* หน้าจอโหลดข้อมูล */
        .loader { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #06C755; 
            animation: spin 1s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* -------------------------------------- */
        /* ดีไซน์ป๊อปอัพแบบใหม่ (Modern Modal) */
        /* -------------------------------------- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* ฉากหลังสีดำโปร่งแสง */
            backdrop-filter: blur(5px); /* เบลอฉากหลังให้ดูพรีเมียม */
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 30px 25px;
            border-radius: 20px; /* ขอบโค้งมน */
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 80%;
            max-width: 320px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* อนิเมชั่นเด้งดึ๋ง */
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .modal-title { margin: 0 0 10px 0; color: #111; font-size: 22px; font-weight: bold; }
        .modal-text { margin: 0 0 15px 0; color: #666; font-size: 15px; }
        
        /* กล่องแสดงรหัส UID */
        .uid-box {
            background: #f0f4f8;
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            color: #333;
            word-break: break-all;
            margin-bottom: 20px;
            border: 1px dashed #b3c0d1;
        }
        
        /* ปุ่มกดตกลง */
        .btn-primary {
            background-color: #06C755; /* สีเขียว LINE */
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.97); } /* เอฟเฟกต์ตอนกดปุ่ม */
    </style>
</head>
<body>
    <div class="loader" id="loaderSection">
        <div class="spinner"></div>
        <p id="statusText">กำลังตรวจสอบข้อมูล LINE...</p>
    </div>

    <div id="customModal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-icon">✅</div>
            <h3 class="modal-title">ยืนยันตัวตนสำเร็จ!</h3>
            <p class="modal-text">ระบบได้เชื่อมต่อบัญชี LINE ของคุณเรียบร้อยแล้ว รหัสของคุณคือ:</p>
            <div class="uid-box" id="uidDisplay"></div>
            <button class="btn-primary" onclick="goToForm()">เข้าสู่หน้ากรอกข้อมูล</button>
        </div>
    </div>

    <script>
        let finalFormUrl = ""; // ตัวแปรเก็บลิงก์ที่จะไป

        async function main() {
            try {
                await liff.init({ liffId: "2009651859-yFydAvlN" });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                } else {
                    const profile = await liff.getProfile();
                    const userId = profile.userId;

                    const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeJvVqppQK2ERxqxrxU3QLK5tT5N432L91qxtVnUsQfn9o_cQ/viewform";
                    const entryId = "entry.1773951231"; 
                    finalFormUrl = `${baseFormUrl}?usp=pp_url&${entryId}=${userId}`;

                    // เมื่อดึงข้อมูลเสร็จ ให้ซ่อนหน้าโหลด และโชว์ ป๊อปอัพสวยๆ แทน
                    document.getElementById('loaderSection').style.display = 'none';
                    document.getElementById('uidDisplay').innerText = userId;
                    document.getElementById('customModal').style.display = 'flex';
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ: " + err.message);
            }
        }
        
        // ฟังก์ชันเมื่อกดปุ่ม "เข้าสู่หน้ากรอกข้อมูล"
        function goToForm() {
            window.location.replace(finalFormUrl);
        }

        main();
    </script>
</body>
</html>
