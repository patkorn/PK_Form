<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบฟอร์ม...</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .loader { text-align: center; }
    </style>
</head>
<body>
    <div class="loader">
        <p id="statusText">กรุณารอสักครู่...</p>
    </div>

    <script>
        async function main() {
            try {
                await liff.init({ liffId: "2009651859-yFydAvlN" });

                if (!liff.isLoggedIn()) {
                    liff.login({ redirectUri: window.location.href });
                } else {
                    document.getElementById('statusText').innerText = "กำลังเตรียมแบบฟอร์ม...";
                    
                    const profile = await liff.getProfile();
                    const userId = profile.userId;

                    const baseFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeJvVqppQK2ERxqxrxU3QLK5tT5N432L91qxtVnUsQfn9o_cQ/viewform";
                    const entryId = "entry.1773951231"; 
                    const finalUrl = `${baseFormUrl}?usp=pp_url&${entryId}=${userId}`;

                    // --- เพิ่มระบบ Debug เด้งแจ้งเตือนเพื่อดูรหัส UID ---
                    alert("ตรวจสอบสถานะ:\nดึง UID สำเร็จ!\nรหัสของคุณคือ: " + userId + "\n\nกด OK เพื่อไปหน้ากรอกฟอร์ม");

                    window.location.replace(finalUrl);
                }
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        }
        main();
    </script>
</body>
</html>
